<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchaeoGraph Virginia — Knowledge Graph Explorer</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #111214;
  --bg-raised: #1a1c1f;
  --bg-hover:  #23262b;
  --border:    #2c2f36;
  --text:      #d4d4d8;
  --text-dim:  #8b8d94;
  --accent:    #c49a6c;
  --accent-dim:#8a6d4b;
  --accent-bg: rgba(196,154,108,0.08);
  --tag-bg:    #23262b;
  --tag-active:#332a1f;
  --source-bg: #1e2024;
  --radius:    8px;
  --radius-sm: 5px;
  --font:      'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono:      'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
}

html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ───────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

/* ── Header ───────────────────────────────────────────────── */
header {
  grid-column: 1 / -1;
  padding: 28px 36px 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.header-top {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 20px;
}

.logo {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
}

.logo span { color: var(--text-dim); font-weight: 400; }

.badge {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent-dim);
  background: var(--accent-bg);
  padding: 3px 8px;
  border-radius: 3px;
  font-weight: 600;
}

/* ── Search ───────────────────────────────────────────────── */
.search-area { margin-bottom: 18px; }

.search-box {
  display: flex;
  gap: 0;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.15s;
}

.search-box:focus-within { border-color: var(--accent-dim); }

.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 14px 18px;
  font-size: 0.95rem;
  color: var(--text);
  font-family: var(--font);
  outline: none;
}

.search-box input::placeholder { color: var(--text-dim); }

.search-box button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 0 24px;
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.search-box button:hover { background: #d4aa7c; }

/* ── Active Filters Bar ──────────────────────────────────── */
.active-filters-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  min-height: 0;
  transition: all 0.2s ease;
}

.active-filters-bar.has-filters {
  min-height: 32px;
}

.active-filters-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  font-weight: 600;
  flex-shrink: 0;
}

.filter-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  color: var(--accent);
  background: var(--tag-active);
  border: 1px solid var(--accent-dim);
  border-radius: 20px;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
  animation: pill-in 0.2s ease-out;
}

@keyframes pill-in {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}

.filter-pill:hover {
  background: rgba(196,154,108,0.18);
}

.filter-pill .pill-x {
  font-size: 0.68rem;
  opacity: 0.6;
  font-weight: 700;
  margin-left: 2px;
}

.filter-pill:hover .pill-x {
  opacity: 1;
}

.filter-pill .pill-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.pill-dot.peoples  { background: #b07d4f; }
.pill-dot.persons  { background: #c47a5a; }
.pill-dot.sites    { background: #6b8a8a; }
.pill-dot.places   { background: #5b8a72; }
.pill-dot.periods  { background: #7a6fa0; }
.pill-dot.artifacts{ background: #8a7054; }

.clear-filters-btn {
  font-size: 0.72rem;
  color: var(--text-dim);
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.15s;
}

.clear-filters-btn:hover {
  color: var(--accent);
  border-color: var(--accent-dim);
}

/* ── Sample Queries ───────────────────────────────────────── */
.sample-queries {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}

.sample-chip {
  font-size: 0.78rem;
  color: var(--text-dim);
  background: var(--tag-bg);
  border: 1px solid transparent;
  border-radius: 20px;
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
  line-height: 1.4;
}

.sample-chip:hover {
  color: var(--accent);
  border-color: var(--accent-dim);
  background: var(--accent-bg);
}

/* ── Sidebar ──────────────────────────────────────────────── */
.sidebar {
  padding: 24px 20px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  max-height: calc(100vh - 140px);
  position: sticky;
  top: 0;
}

.sidebar h3 {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin: 0 0 10px;
  padding: 0 4px;
}

.sidebar h3:not(:first-child) { margin-top: 22px; }

.sidebar-hint {
  font-size: 0.72rem;
  color: var(--text-dim);
  padding: 8px 10px 14px;
  line-height: 1.5;
  opacity: 0.7;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}

.entity-list { list-style: none; }

.entity-item {
  font-size: 0.82rem;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.12s;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}

.entity-item:hover { background: var(--bg-hover); color: var(--text); }

.entity-item.active {
  background: var(--tag-active);
  color: var(--accent);
}

.entity-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.entity-dot.peoples  { background: #b07d4f; }
.entity-dot.persons  { background: #c47a5a; }
.entity-dot.sites    { background: #6b8a8a; }
.entity-dot.places   { background: #5b8a72; }
.entity-dot.periods  { background: #7a6fa0; }
.entity-dot.artifacts{ background: #8a7054; }

.entity-count {
  margin-left: auto;
  font-size: 0.7rem;
  color: var(--text-dim);
  opacity: 0.5;
  font-variant-numeric: tabular-nums;
}

/* ── Results ──────────────────────────────────────────────── */
.results {
  padding: 28px 36px;
  max-width: 820px;
  overflow-y: auto;
  max-height: calc(100vh - 140px);
}

.results-empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}

.results-empty p { font-size: 0.95rem; margin-top: 8px; }

/* Typing indicator */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 0;
  color: var(--text-dim);
  font-size: 0.85rem;
}

.typing-dots { display: flex; gap: 4px; }

.typing-dots span {
  width: 5px; height: 5px;
  background: var(--accent-dim);
  border-radius: 50%;
  animation: dot-pulse 1.2s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-pulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── Answer Card ──────────────────────────────────────────── */
.answer-card {
  animation: fade-up 0.35s ease-out;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.answer-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  font-size: 0.75rem;
  color: var(--text-dim);
}

.answer-meta .strategy {
  background: var(--accent-bg);
  color: var(--accent);
  padding: 3px 9px;
  border-radius: 3px;
  font-weight: 600;
}

.answer-body {
  font-size: 0.94rem;
  line-height: 1.75;
  color: var(--text);
}

.answer-body p { margin-bottom: 14px; }

.answer-body .citation {
  font-size: 0.75rem;
  color: var(--accent);
  vertical-align: super;
  cursor: help;
  font-weight: 600;
}

/* ── Sources ──────────────────────────────────────────────── */
.sources-section {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.section-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--text-dim);
  margin-bottom: 12px;
  font-weight: 600;
}

.source-card {
  background: var(--source-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.source-num {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-bg);
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.source-info { flex: 1; }

.source-title {
  font-size: 0.84rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
}

.source-detail {
  font-size: 0.76rem;
  color: var(--text-dim);
  line-height: 1.5;
}

.source-chunk {
  font-size: 0.78rem;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 6px;
  padding-left: 10px;
  border-left: 2px solid var(--border);
  line-height: 1.55;
}

/* ── Evidence Chain ───────────────────────────────────────── */
.evidence-section {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.evidence-chain {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.ev-node {
  font-size: 0.76rem;
  padding: 5px 11px;
  border-radius: var(--radius-sm);
  font-weight: 500;
}

.ev-node.entity {
  background: var(--tag-bg);
  color: var(--text);
  border: 1px solid var(--border);
}

.ev-node.relation {
  color: var(--text-dim);
  font-size: 0.7rem;
  font-style: italic;
  padding: 5px 4px;
}

.ev-arrow {
  color: var(--text-dim);
  font-size: 0.7rem;
  opacity: 0.4;
}

.ev-group {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

/* ── Graph Stats ──────────────────────────────────────────── */
.graph-stats {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 28px;
}

.stat-item {
  text-align: center;
}

.stat-value {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

.stat-label {
  font-size: 0.68rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

/* ── Responsive ───────────────────────────────────────────── */
@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
  }
  .sidebar {
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: none;
    position: static;
    display: flex;
    flex-wrap: wrap;
    gap: 0 24px;
  }
  .sidebar h3 { width: 100%; margin-top: 14px !important; }
  .sidebar-hint { width: 100%; }
  .entity-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .entity-count { display: none; }
  .results { padding: 20px 18px; }
  header { padding: 20px 18px 0; }
}

/* ── Scrollbar ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3d44; }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header>
    <div class="header-top">
      <div class="logo">ArchaeoGraph <span>Virginia</span></div>
      <div class="badge">Knowledge Graph Explorer</div>
    </div>
    <div class="search-area">
      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="Ask a question about Virginia archaeology..."
        />
        <button id="search-btn">Search</button>
      </div>
      <div class="active-filters-bar" id="active-filters-bar"></div>
    </div>
    <div class="sample-queries" id="sample-queries"></div>
    <div style="height:14px"></div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Results -->
  <main class="results" id="results">
    <div class="results-empty">
      <p>Select a sample query or click entities in the sidebar to explore the knowledge graph.</p>
    </div>
  </main>
</div>

<script>
// ─── Data ─────────────────────────────────────────────────────

const ENTITIES = {
  "Peoples & Cultures": {
    type: "peoples",
    items: [
      { name: "Monacan", count: 34 },
      { name: "Powhatan", count: 28 },
      { name: "Siouan-speaking peoples", count: 22 },
      { name: "Algonquian peoples", count: 19 },
      { name: "Iroquoian groups", count: 11 },
      { name: "Manahoac", count: 9 },
      { name: "Tutelo", count: 7 },
    ]
  },
  "Persons": {
    type: "persons",
    items: [
      { name: "John Smith", count: 31 },
      { name: "Samuel Kercheval", count: 22 },
      { name: "Wahunsenacah", count: 15 },
      { name: "Thomas Jefferson", count: 12 },
      { name: "John Lederer", count: 9 },
      { name: "William Byrd II", count: 7 },
    ]
  },
  "Sites": {
    type: "sites",
    items: [
      { name: "Cactus Hill", count: 24 },
      { name: "Thunderbird", count: 19 },
      { name: "Werowocomoco", count: 16 },
      { name: "Flint Run", count: 14 },
      { name: "Hatch", count: 11 },
      { name: "Trigg", count: 9 },
      { name: "Ely Mound", count: 7 },
    ]
  },
  "Places": {
    type: "places",
    items: [
      { name: "Shenandoah Valley", count: 41 },
      { name: "James River", count: 37 },
      { name: "Blue Ridge", count: 29 },
      { name: "Potomac River", count: 18 },
      { name: "Piedmont region", count: 16 },
      { name: "Tidewater", count: 14 },
      { name: "Great Valley", count: 12 },
    ]
  },
  "Time Periods": {
    type: "periods",
    items: [
      { name: "Paleoindian (15000\u201310000 BC)", count: 8 },
      { name: "Archaic (8000\u20131200 BC)", count: 23 },
      { name: "Woodland (1200 BC\u20131600 AD)", count: 46 },
      { name: "Late Woodland (900\u20131600 AD)", count: 31 },
      { name: "Contact Era (1600\u20131700)", count: 19 },
      { name: "Colonial Period", count: 15 },
    ]
  },
  "Artifact Types": {
    type: "artifacts",
    items: [
      { name: "Ceramic vessels", count: 38 },
      { name: "Projectile points", count: 33 },
      { name: "Shell-tempered pottery", count: 21 },
      { name: "Crushed-quartz temper ceramics", count: 17 },
      { name: "Stone gorgets", count: 9 },
      { name: "Bone tools", count: 12 },
      { name: "Copper ornaments", count: 6 },
    ]
  }
};

// Map entity names to their type for pill coloring
const ENTITY_TYPE_MAP = {};
for (const [, data] of Object.entries(ENTITIES)) {
  for (const item of data.items) {
    ENTITY_TYPE_MAP[item.name] = data.type;
  }
}

const QUERIES = {
  "What archaeological evidence connects Shenandoah Valley settlements to broader Virginia native cultures?": {
    strategy: "Graph Retrieval",
    answer: `<p>Archaeological evidence from the Shenandoah Valley reveals deep connections between its indigenous settlements and the broader cultural networks of Virginia through material culture, trade patterns, and settlement continuity spanning thousands of years.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 4">[1]</span></p>
<p>The most compelling evidence comes from ceramic traditions. Valley sites consistently yield crushed-quartz-tempered pottery characteristic of Siouan-speaking peoples, particularly the Monacan, whose territory extended from the Blue Ridge Piedmont into the upper James River drainage. These ceramic assemblages share decorative motifs\u2014notably cord-marked and fabric-impressed surfaces\u2014with sites along the James River corridor, suggesting sustained interaction rather than isolated development.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 6">[1]</span></p>
<p>Trade networks further demonstrate these connections. Shell-tempered pottery fragments found at Valley sites originated from Tidewater or coastal-adjacent communities, indicating exchange relationships that crossed the Blue Ridge. Kercheval's account of Valley settlement patterns notes the presence of established trails connecting mountain communities to eastern populations, pathways that archaeology has confirmed through the distribution of non-local lithic materials and marine shell artifacts.<span class="citation" title="History of the Valley of Virginia, pp. 42-58">[2]</span></p>
<p>Late Woodland period sites (900\u20131600 AD) in the Valley show increasing alignment with Monacan cultural patterns, including mound-building practices documented at sites along the upper James. This cultural affiliation stands in contrast to the Algonquian-speaking Powhatan chiefdom to the east, marking the Blue Ridge as a significant cultural boundary while the river valleys served as corridors of interaction.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 7">[1]</span></p>`,
    sources: [
      {
        num: 1,
        title: "The Archaeology of Virginia's First Peoples",
        detail: "Chapters 4, 6, 7 \u2014 Ceramic traditions, regional interaction, Late Woodland period",
        chunk: "The distribution of crushed-quartz-tempered ceramics across the Ridge and Valley province provides the strongest material evidence for Siouan cultural affiliation of Valley populations\u2026"
      },
      {
        num: 2,
        title: "History of the Valley of Virginia",
        detail: "Samuel Kercheval \u2014 pp. 42\u201358, early settlement accounts and indigenous trails",
        chunk: "The paths worn by the feet of the native inhabitants connected the waters of the Shenandoah with those of the James, traversing the gaps of the Blue Ridge at intervals known to the earliest European observers\u2026"
      }
    ],
    evidence: [
      ["Crushed-quartz temper ceramics", "located in", "Shenandoah Valley"],
      ["Crushed-quartz temper ceramics", "affiliated with", "Siouan-speaking peoples"],
      ["Monacan", "member of", "Siouan-speaking peoples"],
      ["Monacan", "located in", "Blue Ridge"],
      ["Blue Ridge", "within", "Piedmont region"],
      ["Shell-tempered pottery", "located in", "Tidewater"],
    ],
    stats: { nodes: 14, relationships: 23, sources: 2 }
  },

  "How did ceramic traditions differ between Tidewater and Piedmont peoples?": {
    strategy: "Filter Search",
    answer: `<p>Ceramic traditions in Virginia reveal a fundamental cultural divide between the Tidewater and Piedmont regions, serving as one of the most reliable archaeological markers for distinguishing Algonquian-speaking coastal populations from Siouan-speaking interior groups.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 5">[1]</span></p>
<p>Tidewater ceramics, produced by communities within the Powhatan chiefdom and related Algonquian peoples, are predominantly characterized by shell tempering\u2014the practice of adding crushed shell to clay to improve firing and durability. Roanoke series and Townsend series wares dominate coastal assemblages, with surface treatments including cord-marking, simple stamping, and distinctive incised decorations that reflect influence from broader Mid-Atlantic Algonquian traditions.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 5">[1]</span></p>
<p>Piedmont ceramics stand in marked contrast. The Monacan and related Siouan-speaking peoples employed crushed quartz as the primary tempering agent, producing a visually and texturally distinct ware. Dan River and Radford series ceramics dominate the Piedmont assemblage, with surface treatments favoring cord-marking and fabric-impressing. Vessel forms also differ: Piedmont pots tend toward wider orifices and more globular bodies compared to Tidewater forms.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 6">[1]</span></p>
<p>The boundary between these traditions is not absolute. Sites in the Fall Line zone\u2014where the Piedmont meets the coastal plain\u2014yield mixed assemblages, suggesting trade, interaction, or overlapping territorial use during the Late Woodland period.<span class="citation" title="History of the Valley of Virginia, pp. 31-39">[2]</span></p>`,
    sources: [
      {
        num: 1,
        title: "The Archaeology of Virginia's First Peoples",
        detail: "Chapters 5\u20136 \u2014 Ceramic typology, regional variation",
        chunk: "Shell tempering appears almost exclusively east of the Fall Line, while crushed-quartz tempering dominates assemblages from the Piedmont westward through the Blue Ridge\u2026"
      },
      {
        num: 2,
        title: "History of the Valley of Virginia",
        detail: "Samuel Kercheval \u2014 pp. 31\u201339, observations on native material culture",
        chunk: "Among the relics found in the earth are fragments of vessels of pottery, rudely fashioned yet serviceable, differing in their composition from those described by the eastern chroniclers\u2026"
      }
    ],
    evidence: [
      ["Powhatan", "located in", "Tidewater"],
      ["Shell-tempered pottery", "located in", "Tidewater"],
      ["Monacan", "located in", "Piedmont region"],
      ["Crushed-quartz temper ceramics", "located in", "Piedmont region"],
      ["Shell-tempered pottery", "documented in", "The Archaeology of Virginia's First Peoples"],
    ],
    stats: { nodes: 9, relationships: 14, sources: 2 }
  },

<p>Material culture from the site includes dense concentrations of shell-tempered pottery, copper artifacts, and other prestige items consistent with a chiefly center. The site's strategic position on the York River placed it at the intersection of estuarine resources and the riverine trade networks that linked Tidewater communities, reinforcing its role as the political heart of the Powhatan world.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 7\u20138">[1]</span></p>`,

      { num: 1, title: "The Archaeology of Virginia's First Peoples", detail: "Chapters 7\u20138 \u2014 Werowocomoco and Powhatan political organization", chunk: "The discovery and excavation of Werowocomoco has reshaped understanding of Powhatan political geography, revealing a capital with monumental architecture and deep temporal roots\u2026" }
    ],
    evidence: [
      ["Werowocomoco", "affiliated with", "Powhatan"],
      ["Wahunsenacah", "member of", "Powhatan"],
      ["Shell-tempered pottery", "located in", "Werowocomoco"],
      ["Werowocomoco", "dated to", "Late Woodland (900\u20131600 AD)"],
      ["Powhatan", "located in", "Tidewater"],
    ],
    stats: { nodes: 10, relationships: 16, sources: 1 }
  },

  // Trigg + Late Woodland
  "Late Woodland (900\u20131600 AD)|Trigg": {
    strategy: "Filter Search \u2014 Site + Period",
    answer: `<p>The Trigg site, located along the New River in Radford, Virginia, is one of the most significant Late Woodland village sites in the western Virginia Piedmont. Excavations revealed a substantial palisaded settlement with evidence of intensive maize agriculture, diverse craft production, and complex mortuary practices dating to the fifteenth and sixteenth centuries.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 7">[1]</span></p>
<p>The site's ceramic assemblage is dominated by Radford series wares\u2014crushed-quartz-tempered pottery with cord-marked and fabric-impressed surfaces characteristic of Siouan-speaking peoples in the region. The presence of shell-tempered sherds alongside the dominant quartz-tempered wares suggests trade contact with Tidewater or other shell-tempering communities, documenting the kind of inter-regional exchange that connected Virginia's diverse Late Woodland populations.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 7">[1]</span></p>
<p>Trigg's location on the New River places it within the territory traditionally attributed to Siouan-speaking groups, and its material culture aligns with the broader Monacan/Manahoac cultural sphere. The site provides critical evidence for understanding Late Woodland social organization, settlement patterns, and cultural boundaries in western Virginia.<span class="citation" title="The Archaeology of Virginia's First Peoples, Ch. 7">[1]</span></p>`,
    sources: [
      { num: 1, title: "The Archaeology of Virginia's First Peoples", detail: "Chapter 7 \u2014 Late Woodland village sites in western Virginia", chunk: "The Trigg site represents one of the best-documented Late Woodland palisaded villages in the western Virginia interior, with material culture firmly within the Siouan cultural tradition\u2026" }
    ],
    evidence: [
      ["Trigg", "dated to", "Late Woodland (900\u20131600 AD)"],
      ["Trigg", "located in", "New River"],
      ["Crushed-quartz temper ceramics", "located in", "Trigg"],
      ["Trigg", "affiliated with", "Siouan-speaking peoples"],
    ],
    stats: { nodes: 8, relationships: 13, sources: 1 }
  }
};

const QUERY_LABELS = [
  "Shenandoah Valley \u2194 Virginia native cultures",
  "Tidewater vs. Piedmont ceramics",
  "Monacan settlements on the James River",
  "Contact Era impact on indigenous peoples"
];

const QUERY_KEYS = Object.keys(QUERIES);

// ─── State ────────────────────────────────────────────────────

let activeEntities = new Set();
let searchIsFromFilters = false;
let filterSearchDebounce = null;

// ─── Render Functions ─────────────────────────────────────────

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  let html = `<div class="sidebar-hint">Click entities to search by topic</div>`;
  for (const [category, data] of Object.entries(ENTITIES)) {
    html += `<h3>${category}</h3><ul class="entity-list">`;
    for (const item of data.items) {
      const id = item.name.replace(/[^a-zA-Z0-9]/g, "_");
      html += `
        <li class="entity-item" data-entity="${item.name}" data-type="${data.type}" data-id="${id}">
          <span class="entity-dot ${data.type}"></span>
          ${item.name}
          <span class="entity-count">${item.count}</span>
        </li>`;
    }
    html += `</ul>`;
  }
  sidebar.innerHTML = html;

  sidebar.querySelectorAll(".entity-item").forEach(el => {
    el.addEventListener("click", () => toggleEntity(el));
  });
}

function toggleEntity(el) {
  const name = el.dataset.entity;
  el.classList.toggle("active");
  if (activeEntities.has(name)) {
    activeEntities.delete(name);
  } else {
    activeEntities.add(name);
  }
  renderActiveFilters();
  updateSearchPlaceholder();
  triggerFilterSearch();
}

function setEntityActive(name, active) {
  const el = document.querySelector(`.entity-item[data-entity="${CSS.escape(name)}"]`);
  if (!el) return;
  if (active) {
    el.classList.add("active");
    activeEntities.add(name);
  } else {
    el.classList.remove("active");
    activeEntities.delete(name);
  }
}

function clearAllFilters() {
  activeEntities.clear();
  document.querySelectorAll(".entity-item.active").forEach(el => el.classList.remove("active"));
  renderActiveFilters();
  updateSearchPlaceholder();
}

function renderActiveFilters() {
  const bar = document.getElementById("active-filters-bar");
  if (activeEntities.size === 0) {
    bar.innerHTML = "";
    bar.classList.remove("has-filters");
    return;
  }

  bar.classList.add("has-filters");
  let html = `<span class="active-filters-label">Searching by:</span>`;

  for (const name of activeEntities) {
    const type = ENTITY_TYPE_MAP[name] || "peoples";
    html += `
      <button class="filter-pill" data-entity="${name}">
        <span class="pill-dot ${type}"></span>
        ${name}
        <span class="pill-x">\u00d7</span>
      </button>`;
  }

  if (activeEntities.size > 1) {
    html += `<button class="clear-filters-btn">Clear all</button>`;
  }

  bar.innerHTML = html;

  bar.querySelectorAll(".filter-pill").forEach(pill => {
    pill.addEventListener("click", () => {
      const entity = pill.dataset.entity;
      setEntityActive(entity, false);
      renderActiveFilters();
      updateSearchPlaceholder();
      triggerFilterSearch();
    });
  });

  const clearBtn = bar.querySelector(".clear-filters-btn");
  if (clearBtn) {
    clearBtn.addEventListener("click", () => {
      clearAllFilters();
      // Show empty state
      document.getElementById("results").innerHTML = `
        <div class="results-empty">
          <p>Select a sample query or click entities in the sidebar to explore the knowledge graph.</p>
        </div>`;
    });
  }
}

function generateFilterSummary() {
  if (activeEntities.size === 0) return "";

  const names = [...activeEntities];
  const peoples = names.filter(n => ENTITY_TYPE_MAP[n] === "peoples");
  const persons = names.filter(n => ENTITY_TYPE_MAP[n] === "persons");
  const sites = names.filter(n => ENTITY_TYPE_MAP[n] === "sites");
  const places = names.filter(n => ENTITY_TYPE_MAP[n] === "places");
  const periods = names.filter(n => ENTITY_TYPE_MAP[n] === "periods");
  const artifacts = names.filter(n => ENTITY_TYPE_MAP[n] === "artifacts");

  let parts = [];

  if (peoples.length) {
    parts.push(peoples.join(" and "));
  }
  if (persons.length) {
    parts.push(persons.join(" and "));
  }
  if (artifacts.length) {
    parts.push(artifacts.join(" and "));
  }
  if (sites.length) {
    parts.push("at " + sites.join(" and "));
  }
  if (places.length) {
    parts.push("in the " + places.join(" and "));
  }
  if (periods.length) {
    parts.push("during the " + periods.join(" and "));
  }

  return parts.join(" ") || names.join(", ");
}

function updateSearchPlaceholder() {
  const input = document.getElementById("search-input");
  // Only update placeholder if user hasn't typed anything
  if (!input.value.trim() || searchIsFromFilters) {
    const summary = generateFilterSummary();
    if (summary) {
      input.placeholder = summary;
      if (searchIsFromFilters) {
        input.value = "";
      }
    } else {
      input.placeholder = "Ask a question about Virginia archaeology...";
    }
  }
}

function triggerFilterSearch() {
  if (activeEntities.size === 0) return;

  searchIsFromFilters = true;
  // Debounce to avoid rapid re-searches when toggling multiple filters quickly
  clearTimeout(filterSearchDebounce);
  filterSearchDebounce = setTimeout(() => {
    executeFilterSearch();
    searchIsFromFilters = false;
  }, 150);
}

function findFilterResponse(selectedNames) {
  // Sort names for consistent key matching
  const sortedNames = [...selectedNames].sort();

  // Try exact combination match (pipe-separated sorted)
  const comboKey = sortedNames.join("|");
  if (FILTER_RESPONSES[comboKey]) return FILTER_RESPONSES[comboKey];

  // Try single entity match
  if (sortedNames.length === 1 && FILTER_RESPONSES[sortedNames[0]]) {
    return FILTER_RESPONSES[sortedNames[0]];
  }

  // Try subset matches (find the best match with most overlapping entities)
  let bestMatch = null;
  let bestOverlap = 0;

  for (const key of Object.keys(FILTER_RESPONSES)) {
    const keyEntities = key.split("|");
    const overlap = keyEntities.filter(e => sortedNames.includes(e)).length;
    if (overlap > bestOverlap && overlap === keyEntities.length) {
      bestOverlap = overlap;
      bestMatch = FILTER_RESPONSES[key];
    }
  }

  if (bestMatch) return bestMatch;

  // Generate a plausible generic response
  return generateGenericResponse(selectedNames);
}

function generateGenericResponse(names) {
  const peoples = names.filter(n => ENTITY_TYPE_MAP[n] === "peoples");
  const persons = names.filter(n => ENTITY_TYPE_MAP[n] === "persons");
  const sites = names.filter(n => ENTITY_TYPE_MAP[n] === "sites");
  const places = names.filter(n => ENTITY_TYPE_MAP[n] === "places");
  const periods = names.filter(n => ENTITY_TYPE_MAP[n] === "periods");
  const artifacts = names.filter(n => ENTITY_TYPE_MAP[n] === "artifacts");

  const summary = generateFilterSummary();

  // Build a context-aware answer
  let answerParts = [];

  answerParts.push(`<p>Searching across the knowledge graph for connections involving ${summary} reveals several intersecting threads in the archaeological record of Virginia.<span class="citation" title="The Archaeology of Virginia's First Peoples">[1]</span></p>`);

  if (peoples.length && places.length) {
    answerParts.push(`<p>The relationship between ${peoples.join(" and ")} and ${places.join(" and ")} is documented through settlement patterns, material culture assemblages, and ethnohistorical accounts. Archaeological survey data shows diagnostic artifacts associated with ${peoples[0]} at multiple sites across ${places[0]}, indicating sustained occupation or seasonal use of this landscape.<span class="citation" title="The Archaeology of Virginia's First Peoples">[1]</span></p>`);
  }

  if (persons.length) {
    answerParts.push(`<p>${persons.join(" and ")} contributed to the documentary and scholarly record of Virginia archaeology. Their observations, excavations, or written accounts provide essential context for interpreting the material evidence recovered from archaeological sites across the region.<span class="citation" title="The Archaeology of Virginia's First Peoples">[1]</span></p>`);
  }

  if (sites.length) {
    answerParts.push(`<p>The archaeological site${sites.length > 1 ? "s" : ""} of ${sites.join(" and ")} provide${sites.length === 1 ? "s" : ""} stratified evidence of indigenous occupation, with material culture assemblages that illuminate settlement patterns, subsistence strategies, and cultural affiliations across multiple periods.<span class="citation" title="The Archaeology of Virginia's First Peoples">[1]</span></p>`);
  }

  if (periods.length) {
    answerParts.push(`<p>The ${periods.join(" and ")} provides the temporal framework for understanding these connections. Cultural changes during this era\u2014visible in shifting ceramic styles, settlement patterns, and subsistence strategies\u2014reflect broader transformations across Virginia's indigenous landscape.<span class="citation" title="The Archaeology of Virginia's First Peoples">[1]</span></p>`);
  }

  if (artifacts.length) {
    answerParts.push(`<p>${artifacts.join(" and ")} serve as key diagnostic indicators in the archaeological record. Their distribution across sites helps researchers trace trade networks, cultural boundaries, and technological change over time. Analysis of these artifacts from Virginia sites contributes to understanding both local traditions and broader regional interaction spheres.<span class="citation" title="History of the Valley of Virginia">[2]</span></p>`);
  }

  if (!peoples.length && !persons.length && !sites.length && !places.length && !periods.length && !artifacts.length) {
    answerParts.push(`<p>The selected entities intersect across multiple subgraphs in the knowledge graph, suggesting connections documented in both primary archaeological sources and historical accounts of Virginia.<span class="citation" title="The Archaeology of Virginia's First Peoples">[1]</span></p>`);
  }

  answerParts.push(`<p>Further investigation through the full knowledge graph would synthesize graph traversals and entity-relationship analysis to provide a comprehensive picture of these interconnections.<span class="citation" title="History of the Valley of Virginia">[2]</span></p>`);

  // Valid SHACL-derived relationship labels mapped by entity type pairs
  // [subjectType, relationship, objectType]
  const VALID_RELATIONSHIPS = {
    "peoples-places":   "located in",       // Group -> Place
    "sites-places":     "located in",       // Site -> Place
    "artifacts-places": "located in",       // Artifact -> Place
    "peoples-peoples":  "member of",        // Group -> Group
    "persons-peoples":  "member of",        // Person -> Group
    "sites-peoples":    "affiliated with",  // Site -> Group
    "artifacts-peoples":"affiliated with",  // Artifact -> Group
    "sites-periods":    "dated to",         // Site -> TimePeriod
    "artifacts-periods":"dated to",         // Artifact -> TimePeriod
    "peoples-periods":  "dated to",         // Group -> TimePeriod (via Event)
    "periods-places":   "took place at",    // Event -> Place
    "periods-peoples":  "involved",         // Event -> Group
    "persons-sites":    "took place at",    // DiscoveryEvent -> Site
    "persons-places":   "took place at",    // DiscoveryEvent -> Place
    "places-places":    "within",           // Place -> Place
    "sites-docs":       "documented in",    // anything -> Document
    "peoples-docs":     "documented in",    // anything -> Document
    "artifacts-docs":   "documented in",    // anything -> Document
  };

  // Build evidence triples from selected entities using valid relationships
  const evidence = [];
  if (peoples.length && places.length) {
    evidence.push([peoples[0], "located in", places[0]]);
  }
  if (peoples.length && artifacts.length) {
    evidence.push([artifacts[0], "affiliated with", peoples[0]]);
  }
  if (persons.length && peoples.length) {
    evidence.push([peoples[0], "documented in", persons[0]]);
  }
  if (persons.length && sites.length) {
    evidence.push([persons[0], "took place at", sites[0]]);
  }
  if (sites.length && periods.length) {
    evidence.push([sites[0], "dated to", periods[0]]);
  }
  if (sites.length && peoples.length) {
    evidence.push([sites[0], "affiliated with", peoples[0]]);
  }
  if (sites.length && places.length) {
    evidence.push([sites[0], "located in", places[0]]);
  }
  if (places.length && artifacts.length) {
    evidence.push([artifacts[0], "located in", places[0]]);
  }
  if (periods.length && peoples.length) {
    evidence.push([periods[0], "involved", peoples[0]]);
  }
  if (periods.length && places.length) {
    evidence.push([periods[0], "took place at", places[0]]);
  }
  // Add at least one triple if we have multiple entities of same type
  if (evidence.length === 0 && names.length >= 2) {
    const t = ENTITY_TYPE_MAP[names[0]];
    if (t === "places") {
      evidence.push([names[0], "within", names[1]]);
    } else if (t === "peoples") {
      evidence.push([names[0], "member of", names[1]]);
    } else {
      evidence.push([names[0], "documented in", names[1]]);
    }
  }

  return {
    strategy: "Filter Search \u2014 Entity Intersection",
    answer: answerParts.join("\n"),
    sources: [
      { num: 1, title: "The Archaeology of Virginia's First Peoples", detail: "Multiple chapters \u2014 cross-referenced entity analysis", chunk: "Graph traversal identified connections spanning multiple relationship types\u2026" },
      { num: 2, title: "History of the Valley of Virginia", detail: "Samuel Kercheval \u2014 contextual historical accounts", chunk: "The historical record provides corroborating accounts for patterns identified in the archaeological evidence\u2026" }
    ],
    evidence: evidence,
    stats: {
      nodes: 5 + names.length * 3,
      relationships: 4 + names.length * 4,
      sources: 2
    }
  };
}

function executeFilterSearch() {
  const names = [...activeEntities];
  if (names.length === 0) return;

  const data = findFilterResponse(names);
  renderResultData(data);
}

function renderSampleQueries() {
  const container = document.getElementById("sample-queries");
  QUERY_KEYS.forEach((q, i) => {
    const chip = document.createElement("button");
    chip.className = "sample-chip";
    chip.textContent = QUERY_LABELS[i];
    chip.addEventListener("click", () => {
      document.getElementById("search-input").value = q;
      searchIsFromFilters = false;
      executeQuery(q);
    });
    container.appendChild(chip);
  });
}

function renderResultData(data) {
  const results = document.getElementById("results");

  // Show typing indicator
  results.innerHTML = `
    <div class="typing-indicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      Traversing knowledge graph\u2026
    </div>`;

  setTimeout(() => {
    let evidenceHtml = "";
    for (const triple of data.evidence) {
      evidenceHtml += `
        <div class="ev-group">
          <span class="ev-node entity">${triple[0]}</span>
          <span class="ev-arrow">\u2192</span>
          <span class="ev-node relation">${triple[1]}</span>
          <span class="ev-arrow">\u2192</span>
          <span class="ev-node entity">${triple[2]}</span>
        </div>`;
    }

    let sourcesHtml = "";
    for (const src of data.sources) {
      sourcesHtml += `
        <div class="source-card">
          <div class="source-num">${src.num}</div>
          <div class="source-info">
            <div class="source-title">${src.title}</div>
            <div class="source-detail">${src.detail}</div>
            <div class="source-chunk">${src.chunk}</div>
          </div>
        </div>`;
    }

    results.innerHTML = `
      <div class="answer-card">
        <div class="answer-meta">
          <span class="strategy">${data.strategy}</span>
          <span>${data.stats.nodes} nodes traversed</span>
          <span>\u00b7</span>
          <span>${data.stats.relationships} relationships</span>
        </div>

        <div class="answer-body">
          ${data.answer}
        </div>

        <div class="sources-section">
          <div class="section-label">Sources</div>
          ${sourcesHtml}
        </div>

        <div class="evidence-section">
          <div class="section-label">Knowledge Graph Connections Used</div>
          <div class="evidence-chain">
            ${evidenceHtml}
          </div>
        </div>

        <div class="graph-stats">
          <div class="stat-item">
            <div class="stat-value">${data.stats.nodes}</div>
            <div class="stat-label">Nodes</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${data.stats.relationships}</div>
            <div class="stat-label">Relationships</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${data.stats.sources}</div>
            <div class="stat-label">Sources</div>
          </div>
        </div>
      </div>`;
  }, 600);
}

function renderResults(queryKey) {
  const data = QUERIES[queryKey];
  if (!data) return;

  renderResultData(data);

  // Highlight sidebar entities mentioned in evidence
  setTimeout(() => {
    highlightEvidenceEntities(data.evidence);
    renderActiveFilters();
    updateSearchPlaceholder();
  }, 650);
}

function highlightEvidenceEntities(evidence) {
  const mentioned = new Set();
  for (const triple of evidence) {
    mentioned.add(triple[0]);
    mentioned.add(triple[2]);
  }

  document.querySelectorAll(".entity-item").forEach(el => {
    if (mentioned.has(el.dataset.entity)) {
      el.classList.add("active");
      activeEntities.add(el.dataset.entity);
    } else {
      el.classList.remove("active");
      activeEntities.delete(el.dataset.entity);
    }
  });
}

function executeQuery(text) {
  // Find exact match or closest match
  const key = QUERY_KEYS.find(k =>
    k.toLowerCase() === text.toLowerCase()
  ) || QUERY_KEYS.find(k =>
    text.toLowerCase().includes(k.substring(0, 30).toLowerCase())
  ) || QUERY_KEYS[0];

  renderResults(key);
}

// ─── Event Listeners ──────────────────────────────────────────

document.getElementById("search-btn").addEventListener("click", () => {
  const val = document.getElementById("search-input").value.trim();
  if (val) {
    searchIsFromFilters = false;
    executeQuery(val);
  } else if (activeEntities.size > 0) {
    executeFilterSearch();
  }
});

document.getElementById("search-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const val = e.target.value.trim();
    if (val) {
      searchIsFromFilters = false;
      executeQuery(val);
    } else if (activeEntities.size > 0) {
      executeFilterSearch();
    }
  }
});

// When user starts typing, clear filter-driven placeholder behavior
document.getElementById("search-input").addEventListener("input", (e) => {
  if (e.target.value.trim()) {
    searchIsFromFilters = false;
  }
});

// ─── Init ─────────────────────────────────────────────────────

renderSidebar();
renderSampleQueries();

// Auto-load first query
const defaultQuery = QUERY_KEYS[0];
document.getElementById("search-input").value = defaultQuery;
executeQuery(defaultQuery);
</script>

</body>
</html>
